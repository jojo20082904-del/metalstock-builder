<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Металл Склад</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0c10;
            font-family: Arial, Helvetica, sans-serif;
            padding: 12px;
            color: white;
            min-height: 100vh;
        }

        .title {
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 16px;
            color: #facc15;
        }

        /* БЛОК ПОИСКА */
        .search-box {
            background: #11151c;
            border-radius: 20px;
            padding: 10px;
            margin-bottom: 12px;
            border: 1px solid #2d3748;
        }
        .search-row {
            display: flex;
            gap: 8px;
        }
        .search-row input {
            flex: 2;
            background: #0a0c10;
            border: 1px solid #2d3748;
            border-radius: 30px;
            padding: 10px;
            color: white;
            font-size: 13px;
            text-align: center;
        }
        .search-row button {
            flex: 1;
            background: #3b82f6;
            border: none;
            border-radius: 30px;
            padding: 10px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        /* БЛОК ДОБАВЛЕНИЯ */
        .add-box {
            background: #11151c;
            border-radius: 20px;
            padding: 10px;
            margin-bottom: 12px;
            border: 1px solid #2d3748;
        }
        .add-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        .add-row input {
            flex: 1;
            background: #0a0c10;
            border: 1px solid #2d3748;
            border-radius: 30px;
            padding: 10px;
            color: white;
            font-size: 13px;
            text-align: center;
        }
        .add-btn {
            background: #3b82f6;
            border: none;
            border-radius: 30px;
            padding: 10px;
            color: white;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            font-size: 13px;
        }

        .search-result {
            margin-top: 10px;
            background: #0a0c10;
            border-radius: 14px;
            padding: 10px;
            display: none;
        }
        .search-result.show {
            display: block;
        }

        .hint {
            text-align: center;
            font-size: 10px;
            color: #4b5563;
            margin-bottom: 10px;
        }

        /* ГОРИЗОНТАЛЬНЫЙ СКРОЛЛ */
        .scroll-x {
            width: 100%;
            overflow-x: auto;
            overflow-y: visible;
            padding-bottom: 10px;
            -webkit-overflow-scrolling: touch;
            scroll-snap-type: x mandatory;
        }
        .cards-row {
            display: flex;
            gap: 12px;
        }

        /* КАРТОЧКА */
        .card {
            width: 93vw;
            min-width: 93vw;
            background: #11151c;
            border-radius: 24px;
            padding: 14px;
            border: 2px solid #facc15;
            scroll-snap-align: start;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            gap: 6px;
            flex-wrap: wrap;
        }
        .metal-name {
            font-size: 18px;
            font-weight: bold;
            color: #facc15;
        }
        .metal-price {
            background: #1e293b;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 11px;
            white-space: nowrap;
        }
        .del-btn {
            background: none;
            border: 1px solid #ef4444;
            border-radius: 20px;
            padding: 4px 10px;
            color: #ef4444;
            cursor: pointer;
            font-size: 11px;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 14px;
        }
        .stat {
            background: #0a0c10;
            border-radius: 14px;
            padding: 8px;
            text-align: center;
        }
        .stat-label {
            font-size: 9px;
            color: #8a8f99;
            margin-bottom: 3px;
        }
        .stat-value {
            font-size: 14px;
            font-weight: bold;
        }

        .input-line {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }
        .input-line input {
            flex: 1;
            background: #0a0c10;
            border: 1px solid #2d3748;
            border-radius: 30px;
            padding: 8px;
            color: white;
            font-size: 13px;
            text-align: center;
        }
        .calc-result {
            background: #0a0c10;
            border: 1px solid #2d3748;
            border-radius: 30px;
            padding: 8px;
            text-align: center;
            font-size: 13px;
            font-weight: bold;
            color: #4ade80;
            min-width: 80px;
        }

        .action-btns {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
        }
        .btn-in {
            flex: 1;
            background: #10b981;
            border: none;
            border-radius: 30px;
            padding: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 12px;
        }
        .btn-out {
            flex: 1;
            background: #ef4444;
            border: none;
            border-radius: 30px;
            padding: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 12px;
        }

        .history-toggle {
            background: none;
            border: none;
            color: #60a5fa;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            padding: 5px 0;
        }
        .history-list {
            margin-top: 8px;
            display: none;
        }
        .history-list.show {
            display: block;
        }
        .day-item {
            border: 1px solid #2d3748;
            border-radius: 10px;
            margin-bottom: 6px;
        }
        .day-title {
            background: #1a1f2a;
            padding: 6px 10px;
            font-weight: bold;
            color: #facc15;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            font-size: 10px;
        }
        .day-content {
            padding: 6px;
            display: none;
        }
        .day-content.show {
            display: block;
        }
        .history-entry {
            background: #0f1218;
            border-radius: 8px;
            padding: 5px 8px;
            margin-bottom: 5px;
            font-size: 9px;
            border-left: 2px solid;
        }

        .empty {
            text-align: center;
            color: #6b7280;
            padding: 40px;
        }

        footer {
            text-align: center;
            font-size: 10px;
            color: #4b5563;
            margin-top: 16px;
        }
    </style>
</head>
<body>

<div class="title">⚙️ МЕТАЛЛ СКЛАД</div>

<div class="search-box">
    <div class="search-row">
        <input type="text" id="searchDate" placeholder="14.04.2026">
        <button id="searchBtn">НАЙТИ</button>
    </div>
    <div id="searchResult" class="search-result"></div>
</div>

<div class="add-box">
    <div class="add-row">
        <input type="text" id="newName" placeholder="Название металла">
        <input type="number" id="newPrice" placeholder="Цена СМ/кг">
    </div>
    <button id="addBtn" class="add-btn">+ ДОБАВИТЬ МЕТАЛЛ</button>
</div>

<div class="hint">← → Листай вправо/влево</div>

<div class="scroll-x">
    <div class="cards-row" id="cardsContainer"></div>
</div>

<footer>Автосохранение | Валюта: сомони (СМ)</footer>

<script>
    let metals = [];

    function save() {
        localStorage.setItem('metals_data', JSON.stringify(metals));
    }

    function load() {
        let data = localStorage.getItem('metals_data');
        if(data) metals = JSON.parse(data);
        else metals = [];
        render();
    }

    function addMetal() {
        let name = document.getElementById('newName').value.trim();
        let price = parseFloat(document.getElementById('newPrice').value);
        if(!name) { alert('Введите название'); return; }
        if(isNaN(price) || price <= 0) { alert('Введите цену'); return; }
        metals.push({
            id: Date.now(),
            name: name,
            price: price,
            stock: 0,
            history: []
        });
        save();
        render();
        document.getElementById('newName').value = '';
        document.getElementById('newPrice').value = '';
    }

    function deleteMetal(id) {
        if(confirm('Удалить металл?')) {
            metals = metals.filter(m => m.id != id);
            save();
            render();
        }
    }

    function updateCalc(id) {
        let m = metals.find(x => x.id == id);
        if(!m) return;
        let kg = parseFloat(document.getElementById(`kg_${id}`).value);
        if(isNaN(kg) || kg <= 0) {
            document.getElementById(`calc_${id}`).innerHTML = '0 СМ';
        } else {
            document.getElementById(`calc_${id}`).innerHTML = (kg * m.price).toFixed(1) + ' СМ';
        }
    }

    function addIncome(id) {
        let m = metals.find(x => x.id == id);
        let kg = parseFloat(document.getElementById(`kg_${id}`).value);
        let priceKg = parseFloat(document.getElementById(`pr_${id}`).value);
        if(isNaN(kg) || kg <= 0) { alert('Введите кг'); return; }
        if(isNaN(priceKg) || priceKg <= 0) { alert('Введите цену'); return; }
        let sum = kg * priceKg;
        m.stock += kg;
        m.history.unshift({
            type: 'in',
            kg: kg,
            priceKg: priceKg,
            sum: sum,
            date: new Date().toLocaleString()
        });
        save();
        render();
    }

    function addOutcome(id) {
        let m = metals.find(x => x.id == id);
        let kg = parseFloat(document.getElementById(`kg_${id}`).value);
        let priceKg = parseFloat(document.getElementById(`pr_${id}`).value);
        if(isNaN(kg) || kg <= 0) { alert('Введите кг'); return; }
        if(isNaN(priceKg) || priceKg <= 0) { alert('Введите цену'); return; }
        if(kg > m.stock) { alert('Не хватает на складе'); return; }
        let sum = kg * priceKg;
        m.stock -= kg;
        m.history.unshift({
            type: 'out',
            kg: kg,
            priceKg: priceKg,
            sum: sum,
            date: new Date().toLocaleString()
        });
        save();
        render();
    }

    function toggleHistory(id) {
        let box = document.getElementById(`history_${id}`);
        if(box) box.classList.toggle('show');
    }

    function toggleDay(dayId) {
        let box = document.getElementById(`day_${dayId}`);
        if(box) box.classList.toggle('show');
    }

    function searchDay() {
        let query = document.getElementById('searchDate').value.trim();
        if(!query) { alert('Введите дату'); return; }
        let inKg = 0, inSum = 0, outKg = 0, outSum = 0;
        let found = [];
        metals.forEach(m => {
            m.history.forEach(h => {
                if(h.date.includes(query)) {
                    if(h.type == 'in') { inKg += h.kg; inSum += h.sum; }
                    else { outKg += h.kg; outSum += h.sum; }
                    if(!found.includes(m.name)) found.push(m.name);
                }
            });
        });
        let resDiv = document.getElementById('searchResult');
        if(inKg == 0 && outKg == 0) {
            resDiv.innerHTML = '<div style="background:#1a1a1a; padding:10px;">❌ Ничего не найдено</div>';
        } else {
            resDiv.innerHTML = `
                <div style="background:#1a1a1a; padding:10px;">
                    <div>📅 ${query} | ${found.join(', ')}</div>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:8px;">
                        <div>📥 ПРИХОД<br><b>${inKg.toFixed(1)} кг</b><br>${inSum.toFixed(1)} СМ</div>
                        <div>📤 РАСХОД<br><b>${outKg.toFixed(1)} кг</b><br>${outSum.toFixed(1)} СМ</div>
                        <div>💰 ОБОРОТ<br><b>${(inSum+outSum).toFixed(1)} СМ</b></div>
                        <div>📦 ВСЕГО КГ<br><b>${(inKg+outKg).toFixed(1)} кг</b></div>
                    </div>
                </div>
            `;
        }
        resDiv.classList.add('show');
    }

    function render() {
        let container = document.getElementById('cardsContainer');
        if(metals.length == 0) {
            container.innerHTML = '<div class="empty">📭 Нет металлов<br>➕ Добавьте первый</div>';
            return;
        }
        container.innerHTML = metals.map(m => {
            let totalVal = m.stock * m.price;
            let inKg = 0, inSum = 0, outKg = 0, outSum = 0;
            m.history.forEach(h => {
                if(h.type == 'in') { inKg += h.kg; inSum += h.sum; }
                else { outKg += h.kg; outSum += h.sum; }
            });
            let groups = {};
            m.history.forEach(h => {
                let d = h.date.split(',')[0];
                if(!groups[d]) groups[d] = [];
                groups[d].push(h);
            });
            let days = Object.keys(groups).sort().reverse();
            let historyHtml = days.length == 0 ? '<div style="padding:8px;">— нет записей —</div>' :
                days.map(d => {
                    let dIn = 0, dOut = 0;
                    groups[d].forEach(h => { if(h.type == 'in') dIn += h.sum; else dOut += h.sum; });
                    let dayId = m.id + d.replace(/[^0-9]/g, '');
                    return `
                        <div class="day-item">
                            <div class="day-title" onclick="toggleDay('${dayId}')">
                                <span>📅 ${d}</span>
                                <span>+${dIn.toFixed(0)} -${dOut.toFixed(0)}</span>
                            </div>
                            <div class="day-content" id="day_${dayId}">
                                ${groups[d].map(h => `
                                    <div class="history-entry" style="border-left-color:${h.type == 'in' ? '#10b981' : '#ef4444'}">
                                        <b>${h.type == 'in' ? 'ПРИХОД' : 'РАСХОД'}</b> ${h.kg.toFixed(1)} кг × ${h.priceKg.toFixed(1)} = ${h.sum.toFixed(1)} СМ
                                        <div style="font-size:8px;">${h.date}</div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                }).join('');
            return `
                <div class="card">
                    <div class="card-header">
                        <span class="metal-name">${escapeHtml(m.name)}</span>
                        <span class="metal-price">💰 ${m.price.toFixed(1)} СМ/кг</span>
                        <button class="del-btn" onclick="deleteMetal(${m.id})">✕</button>
                    </div>
                    <div class="stats">
                        <div class="stat"><div class="stat-label">ЗАПАС</div><div class="stat-value">${m.stock.toFixed(1)} кг</div></div>
                        <div class="stat"><div class="stat-label">СТОИМОСТЬ</div><div class="stat-value">${totalVal.toFixed(1)} СМ</div></div>
                        <div class="stat"><div class="stat-label">ПРИХОД</div><div class="stat-value">${inKg.toFixed(1)} кг</div><div style="font-size:9px;">${inSum.toFixed(1)} СМ</div></div>
                        <div class="stat"><div class="stat-label">РАСХОД</div><div class="stat-value">${outKg.toFixed(1)} кг</div><div style="font-size:9px;">${outSum.toFixed(1)} СМ</div></div>
                    </div>
                    <div class="input-line">
                        <input type="number" id="kg_${m.id}" placeholder="Кг" step="0.1" oninput="updateCalc(${m.id})">
                        <div class="calc-result" id="calc_${m.id}">0 СМ</div>
                    </div>
                    <div class="input-line">
                        <input type="number" id="pr_${m.id}" placeholder="Цена СМ/кг" step="0.1" value="${m.price.toFixed(1)}">
                    </div>
                    <div class="action-btns">
                        <button class="btn-in" onclick="addIncome(${m.id})">ПРИХОД</button>
                        <button class="btn-out" onclick="addOutcome(${m.id})">РАСХОД</button>
                    </div>
                    <button class="history-toggle" onclick="toggleHistory(${m.id})">📜 ИСТОРИЯ ▼</button>
                    <div id="history_${m.id}" class="history-list">${historyHtml}</div>
                </div>
            `;
        }).join('');
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if(m == '&') return '&amp;';
            if(m == '<') return '&lt;';
            if(m == '>') return '&gt;';
            return m;
        });
    }

    document.getElementById('addBtn').onclick = addMetal;
    document.getElementById('searchBtn').onclick = searchDay;
    window.deleteMetal = deleteMetal;
    window.addIncome = addIncome;
    window.addOutcome = addOutcome;
    window.toggleHistory = toggleHistory;
    window.toggleDay = toggleDay;
    window.updateCalc = updateCalc;

    load();
</script>
</body>
</html>
